# GitLab CI/CD pipeline
#
# Stages:
#   test   → pytest on every MR and main push
#   build  → build + push container images to their respective registries
#   deploy → deploy to Oracle Cloud (SSH + docker compose) or AWS Lambda — both manual
#
# Required GitLab CI/CD variables (Settings → CI/CD → Variables):
#
#   AWS:
#     AWS_ACCESS_KEY_ID       IAM user key (needs ECR push + Lambda update + CloudFormation)
#     AWS_SECRET_ACCESS_KEY
#     AWS_REGION              e.g. us-east-1
#     ECR_REGISTRY            e.g. 123456789.dkr.ecr.us-east-1.amazonaws.com
#
# Oracle Cloud deployment is manual — pull the image on the host:
#   docker login registry.gitlab.com -u <user> -p <token>
#   docker pull registry.gitlab.com/vb-home-lab/rag-anything:latest
#   cd /opt/rag-anything && docker compose -f docker-compose.server.yml up -d --no-deps app

stages:
  - test
  - build
  - deploy

variables:
  IMAGE_TAG: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
  IMAGE_LATEST: "$CI_REGISTRY_IMAGE:latest"
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"

# ── TEST ──────────────────────────────────────────────────────────────────────
test:
  stage: test
  image: python:3.11-slim
  variables:
    # Minimal values so pydantic-settings loads — no real services are called
    ENVIRONMENT: test
    CHUNK_SIZE: "500"
    CHUNK_OVERLAP: "50"
    RETRIEVAL_TOP_K: "20"
    RERANKER_SCORE_THRESHOLD: "0.05"
    LLM_PROVIDER: openrouter
    EMBEDDING_DIMENSIONS: "1024"
    S3_BUCKET_NAME: test-bucket
    DYNAMODB_TABLE_NAME: test-table
    AWS_REGION: us-east-1
    QDRANT__URL: http://localhost:6333
    QDRANT__API_KEY: test-key
    QDRANT__COLLECTION_NAME: test-collection
    AUTHENTIK__JWKS_URL: http://localhost/jwks
    AUTHENTIK__CLIENT_ID: test-client
    AUTHENTIK__AUTHORIZATION_URL: http://localhost/auth
    AUTHENTIK__TOKEN_URL: http://localhost/token
    BEDROCK__REGION: us-east-1
    BEDROCK__EMBEDDING_MODEL: amazon.titan-embed-text-v2:0
    BEDROCK__LLM_MODEL: us.amazon.nova-micro-v1:0
    LANGFUSE__PUBLIC_KEY: pk-test
    LANGFUSE__SECRET_KEY: sk-test
    LANGFUSE__HOST: http://localhost:3000
    OPENROUTER__API_KEY: sk-or-test
    OPENROUTER__EMBEDDING_MODEL: qwen/qwen3-embedding-8b
    OPENROUTER__LLM_MODEL: openrouter/free
  before_script:
    - apt-get update -qq && apt-get install -y -qq gcc libgomp1
    - pip install --quiet poetry
    - poetry config virtualenvs.create false
    - poetry install --with dev --no-interaction --no-ansi
  script:
    - poetry run pytest tests/ -v
        --ignore=tests/test_bedrock_hello.py
        --ignore=tests/test_openrouter_hello.py
        -m "not integration"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── BUILD server image → GitLab Container Registry ────────────────────────────
# Used for Oracle Cloud deployment (plain uvicorn, python:3.11-slim base)
build-server:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -f infrastructure/Dockerfile.server -t "$IMAGE_TAG" .
    - docker tag "$IMAGE_TAG" "$IMAGE_LATEST"
    - docker push "$IMAGE_TAG"
    - docker push "$IMAGE_LATEST"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── BUILD Lambda image → AWS ECR ──────────────────────────────────────────────
# Used for AWS Lambda deployment (public.ecr.aws/lambda/python:3.11 base)
build-lambda:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - apk add --no-cache python3 py3-pip
    - pip3 install awscli --break-system-packages --quiet
    - aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"
  script:
    - docker build -f infrastructure/Dockerfile.lambda -t "$ECR_REGISTRY/rag-service:$CI_COMMIT_SHORT_SHA" .
    - docker tag "$ECR_REGISTRY/rag-service:$CI_COMMIT_SHORT_SHA" "$ECR_REGISTRY/rag-service:latest"
    - docker push "$ECR_REGISTRY/rag-service:$CI_COMMIT_SHORT_SHA"
    - docker push "$ECR_REGISTRY/rag-service:latest"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── DEPLOY → AWS Lambda ────────────────────────────────────────────────────────
# Updates the Lambda function to use the newly pushed ECR image.
# NOTE: For first-time setup (creating the stack), run `sam deploy` manually
#       from your workstation using infrastructure/template.yaml.
#       This job only handles ongoing code deployments.
deploy-aws:
  stage: deploy
  image: amazon/aws-cli:latest
  needs:
    - build-lambda
  script:
    - aws lambda update-function-code --function-name "rag-service-prod" --image-uri "$ECR_REGISTRY/rag-service:$CI_COMMIT_SHORT_SHA" --region "$AWS_REGION"
    - aws lambda wait function-updated --function-name "rag-service-prod" --region "$AWS_REGION"
  environment:
    name: aws
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
